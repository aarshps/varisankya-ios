name: iOS Release (TestFlight)

on:
  workflow_dispatch:
    inputs:
      track:
        description: "Upload destination"
        type: choice
        default: "testflight"
        options:
          - "testflight"
          - "appstore"
      bump_build:
        description: "Auto-bump CFBundleVersion?"
        type: boolean
        default: true
  push:
    tags:
      - "v*"

concurrency:
  group: ios-release
  cancel-in-progress: false

jobs:
  archive_and_upload:
    name: Archive, sign, upload
    runs-on: macos-15
    timeout-minutes: 60
    environment: appstore

    env:
      SCHEME: Varisankya
      PROJECT: Varisankya.xcodeproj
      EXPORT_OPTIONS: build/ExportOptions.plist
      ARCHIVE_PATH: build/Varisankya.xcarchive
      IPA_DIR: build/ipa
      KEYCHAIN: signing-temp.keychain

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -switch /Applications/Xcode_16.0.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Restore signing assets
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${BUILD_CERTIFICATE_BASE64:-}" ]; then
            echo "::error::Missing BUILD_CERTIFICATE_BASE64 secret — cannot sign."
            exit 1
          fi

          CERT_PATH=$RUNNER_TEMP/cert.p12
          PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision

          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | xargs)

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin <<< "$(security cms -D -i $PROFILE_PATH)")
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision"
          echo "PROFILE_UUID=$UUID" >> "$GITHUB_ENV"

      - name: Restore Firebase config
        env:
          GOOGLE_SERVICE_INFO_BASE64: ${{ secrets.GOOGLE_SERVICE_INFO_BASE64 }}
        run: |
          if [ -z "${GOOGLE_SERVICE_INFO_BASE64:-}" ]; then
            echo "::error::Missing GOOGLE_SERVICE_INFO_BASE64 secret — cannot upload a real build."
            exit 1
          fi
          mkdir -p Varisankya/Resources
          echo "$GOOGLE_SERVICE_INFO_BASE64" | base64 --decode > Varisankya/Resources/GoogleService-Info.plist
          REVERSED=$(/usr/libexec/PlistBuddy -c "Print :REVERSED_CLIENT_ID" Varisankya/Resources/GoogleService-Info.plist)
          echo "GOOGLE_SIGN_IN_URL_SCHEME=$REVERSED" >> "$GITHUB_ENV"

      - name: Generate AppIcon (if missing)
        run: |
          ICON="Varisankya/Resources/Assets.xcassets/AppIcon.appiconset/AppIcon-1024.png"
          if [ ! -f "$ICON" ]; then
            swift scripts/generate_icon.swift "$ICON"
          fi

      - name: Bump build number
        if: ${{ github.event.inputs.bump_build == 'true' }}
        run: |
          BUILD=$(date +%Y%m%d%H%M)
          echo "BUILD_NUMBER=$BUILD" >> "$GITHUB_ENV"

      - name: Generate Xcode project
        env:
          DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
          BUILD_NUMBER: ${{ env.BUILD_NUMBER }}
        run: |
          # XcodeGen will pick up DEVELOPMENT_TEAM via the project.yml env interp
          xcodegen generate

      - name: Write ExportOptions.plist
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          mkdir -p build
          cat > "$EXPORT_OPTIONS" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key><string>app-store</string>
              <key>teamID</key><string>$APPLE_TEAM_ID</string>
              <key>uploadBitcode</key><false/>
              <key>uploadSymbols</key><true/>
              <key>signingStyle</key><string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.hora.varisankya</key>
                  <string>Varisankya AppStore</string>
              </dict>
              <key>generateAppStoreInformation</key><true/>
              <key>destination</key><string>export</string>
              <key>signingCertificate</key><string>Apple Distribution</string>
          </dict>
          </plist>
          EOF

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT" \
            -scheme "$SCHEME"

      - name: Archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          BUILD_NUMBER: ${{ env.BUILD_NUMBER }}
        run: |
          set -o pipefail
          EXTRA_BUILD=()
          if [ -n "${BUILD_NUMBER:-}" ]; then
            EXTRA_BUILD+=(CURRENT_PROJECT_VERSION="$BUILD_NUMBER")
          fi
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$ARCHIVE_PATH" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="Varisankya AppStore" \
            "${EXTRA_BUILD[@]}" | xcbeautify

      - name: Export IPA
        run: |
          set -o pipefail
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$IPA_DIR" \
            -exportOptionsPlist "$EXPORT_OPTIONS" | xcbeautify

      - name: Upload to App Store Connect (TestFlight)
        env:
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > "$HOME/.appstoreconnect/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8"

          IPA=$(ls "$IPA_DIR"/*.ipa | head -n 1)
          echo "Uploading $IPA"

          xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey "$APPLE_API_KEY_ID" \
            --apiIssuer "$APPLE_API_ISSUER_ID"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Varisankya-IPA
          path: |
            build/ipa/*.ipa
            build/Varisankya.xcarchive/**/*.dSYM
          if-no-files-found: warn

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN" || true
